<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placement Portal</title>

  <!-- Bootstrap CSS for styling -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <!-- Vue renders everything inside this div -->
  <div id="app"></div>

  <!-- Bootstrap JS (needed for dropdowns, modals etc.) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Vue 3 CDN - exposes window.Vue globally -->
  <script src="https://unpkg.com/vue@3.4.38/dist/vue.global.prod.js"></script>

  <!-- Our app files, loaded as regular scripts (no import/export needed) -->
  <script src="/src/api.js"></script>
  <script src="/src/views/login.js"></script>
  <script src="/src/views/register.js"></script>
  <script src="/src/views/admin.js"></script>
  <script src="/src/views/company.js"></script>
  <script src="/src/views/student.js"></script>
  <script src="/src/app.js"></script>

</body>
</html>
